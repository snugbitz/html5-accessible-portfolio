<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
content="width=device-width, initial-scale=1.0">

    <meta name="description"
content="Contact Subhrajyoti Moharana through an accessible and keyboard-friendly contact form.">

<title>Contact | Subhrajyoti Moharana</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Contact Me</h1>
        <nav aria-label="Main navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html"
    aria-current="page">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section aria-labelledby="contact-form-heading">
            <h2 id="contact-form-heading">Send Me a Message</h2>
            <form action="#" method="post">
                <div>
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div>
                    <label for="email">Email Adress:</label>
                    <input type="email" id="email" name="email" required>          
                </div>
                <div>
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required>  
                    </textarea>        
                </div>
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Subhrajyoti Moharana. All rights reserved.</p>
    </footer>
</body>
</html>
